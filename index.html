<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCH JINN | GECƏ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #000000; /* Глубокий черный, как куртка */
            color: #ffffff; /* Чистый белый, как текст на футболке */
            font-family: 'Roboto Mono', monospace; /* Основной шрифт - моноширинный */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* ОБЛОЖКА АЛЬБОМА */
        .cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            margin-bottom: 30px;
            object-fit: cover;
            /* Убрали цветное свечение, оставили резкую тень */
            box-shadow: 0 20px 40px rgba(0,0,0,1);
        }

        h1 { font-family: 'Poppins', sans-serif; font-size: 28px; letter-spacing: 8px; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; color: #ffffff; }
        .status { font-family: 'Poppins', sans-serif; color: #ffffff; font-size: 14px; margin-bottom: 40px; letter-spacing: 4px; text-transform: uppercase; font-weight: 500; }

        /* КНОПКИ СТРИМИНГОВ */
        .music-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-button {
            background: #000000;
            /* Тонкая белая рамка, как металл молнии */
            border: 1px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .link-button i { font-size: 20px; width: 30px; margin-right: 15px; color: #ffffff; }
        .link-button:hover { 
            background: #ffffff; 
            color: #000000; 
            transform: translateY(-2px);
            /* Убрали фиолетовое свечение, оставили белое */
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }
        .link-button:hover i { color: #000000; }

        /* СЕТКА СОЦСЕТЕЙ */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        .social-item {
            background: #000000;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .social-item:hover { 
            background: #ffffff; 
            color: #000000; 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        /* ПОДВАЛ КАК ДИЗАЙНЕРСКАЯ БИРКА */
        .footer { 
            margin-top: 60px; 
            border: 1px solid #444; /* Тонкая серая рамка, как у бирки */
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .booking { font-family: 'Poppins', sans-serif; display: block; margin-bottom: 20px; color: #ffffff; text-decoration: none; font-size: 13px; transition: color 0.3s; letter-spacing: 2px; text-transform: uppercase; }
        .booking:hover { color: #ffffff; text-decoration: underline; }
        
        .margiela-numbers {
            font-size: 9px;
            color: #444; /* Тусклый серый */
            letter-spacing: 4px;
            line-height: 1.2;
            user-select: none;
        }
        .margiela-numbers span.circle {
            color: #ffffff; /* Обведенный белый */
            border: 1px solid #ffffff;
            border-radius: 50%;
            padding: 2px 4px;
            position: relative;
            top: -1px;
            margin: 0 -3px;
        }
        .copyright { font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="cover.webp" alt="GECƏ" class="cover" loading="eager">

        <h1>GECƏ</h1>
        <div class="status">March Jinn</div>

        <div class="music-links">
            <a href="#" class="link-button"><i class="fab fa-apple"></i><span>Apple Music</span></a>
            <a href="https://www.youtube.com/@marchjinn" class="link-button"><i class="fab fa-youtube"></i><span>YouTube Music</span></a>
            <a href="#" class="link-button"><i class="fas fa-music"></i><span>Yandex Music</span></a>
            <a href="#" class="link-button"><i class="fab fa-spotify"></i><span>Spotify</span></a>
            <a href="https://soundcloud.com/marchjinn" class="link-button"><i class="fab fa-soundcloud"></i><span>SoundCloud</span></a>
        </div>

        <div class="social-grid">
            <a href="https://instagram.com/marchjinn" class="social-item"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@marchjinn" class="social-item"><i class="fab fa-tiktok"></i></a>
            <a href="https://t.me/marchjinn" class="social-item"><i class="fab fa-telegram"></i></a>
        </div>

        <div class="footer">
            <a href="mailto:marchjinnmax@gmail.com" class="booking">booking</a>
            
            <div class="margiela-numbers">
                0 1 2 3 4 5 <span class="circle">6</span> 7 8 9<br>
                10 11 12 13 14 15 16<br>
                17 18 19 20 21 22 23
            </div>
            
            <div class="copyright">© 2026 MARCH JINN</div>
        </div>
    </div>

</body>
</html>
