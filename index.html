        .music-links {

            background: #0f0b15;
            border: 1px solid #24143a;
            color: #ffffff;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .link-button i { font-size: 20px; width: 30px; margin-right: 15px; color: #ffffff; }
        .link-button:hover { 
            background: #ffffff; 
            color: #000000; 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(199, 125, 255, 0.3);
            border-color: #ffffff;
        }
        .link-button:hover i { color: #000000; }

        /* СЕТКА СОЦСЕТЕЙ */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        .social-item {
            background: #0f0b15;
            border: 1px solid #24143a;
            color: #ffffff;
            padding: 15px;
            border-radius: 12px;
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .social-item:hover { 
            background: #ffffff; 
            color: #000000;

            box-shadow: 0 10px 20px rgba(199, 125, 255, 0.3);
